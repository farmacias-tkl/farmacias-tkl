name: Daily Sync — Saldos Bancarios

on:
  schedule:
    # Tres ejecuciones por día (todos los días) con idempotencia por modifiedTime:
    # - el primer run que detecta el archivo actualizado escribe los snapshots
    # - los siguientes skipean si modifiedTime no cambió, o reprocesan si el
    #   admin corrigió el Excel entre runs
    # Domingos: saldos bancarios quedan STALE automáticamente (admin no sube
    # Excel) sin escribir en DB. Ventas del sábado vienen de SIAF (Python).
    - cron: "0 7 * * *"    # 04:00 ART — ventas del día anterior (CSV SIAF ya subido)
    - cron: "50 11 * * *"  # 08:50 ART — primera lectura de saldos bancarios
    - cron: "30 12 * * *"  # 09:30 ART — segunda lectura saldos (margen para admin tardío)
  workflow_dispatch:
    inputs:
      source:
        description: "Fuente a sincronizar"
        required: false
        default: "balances"
        type: choice
        options:
          - balances
          - all

jobs:
  sync:
    name: Sync Balances
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger sync webhook
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          URL="${{ secrets.DASHBOARD_URL }}"
          URL="${URL%/}"   # strip trailing slash defensivo
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${URL}/api/sync/trigger" \
            -H "Authorization: Bearer ${{ secrets.SYNC_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\": \"$SOURCE\"}" \
            --max-time 300)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Sync failed with status $HTTP_STATUS"
            exit 1
          fi
