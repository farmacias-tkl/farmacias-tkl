name: Daily Sync — Saldos Bancarios

on:
  schedule:
    # Respaldos del Task Scheduler del servidor (que dispara los syncs reales
    # vía webhook). GitHub Actions corre 30 min después como red de seguridad
    # por si el server quedó apagado, sin red, o el Task Scheduler falló.
    # Idempotencia por modifiedTime: si el sync principal ya escribió, el
    # respaldo skipea (modifiedTime no cambió) o reprocesa si el admin
    # corrigió el Excel entre runs.
    # Domingos: saldos bancarios quedan STALE automáticamente (admin no sube
    # Excel) sin escribir en DB. Ventas del sábado vienen de SIAF (Python).
    - cron: "30 7 * * *"   # 04:30 ART — respaldo ventas (Task Scheduler principal: 04:00)
    - cron: "0 12 * * *"   # 09:00 ART — respaldo saldos (Task Scheduler principal: 08:50)
  workflow_dispatch:
    inputs:
      source:
        description: "Fuente a sincronizar"
        required: false
        default: "balances"
        type: choice
        options:
          - balances
          - all

jobs:
  sync:
    name: Sync Balances
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Trigger sync webhook
        run: |
          SOURCE="${{ github.event.inputs.source || 'all' }}"
          URL="${{ secrets.DASHBOARD_URL }}"
          URL="${URL%/}"   # strip trailing slash defensivo
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "${URL}/api/sync/trigger" \
            -H "Authorization: Bearer ${{ secrets.SYNC_WEBHOOK_SECRET }}" \
            -H "Content-Type: application/json" \
            -d "{\"source\": \"$SOURCE\"}" \
            --max-time 300)
          HTTP_STATUS=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_STATUS"
          echo "Response: $BODY"
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::Sync failed with status $HTTP_STATUS"
            exit 1
          fi
